<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patricius Review Console</title>
    <link rel="stylesheet" href="/app/app.css" />
  </head>
  <body>
    <div class="shell">
      <header class="top-nav">
        <div class="brand-wrap">
          <div class="brand-dot"></div>
          <div>
            <div class="brand-title">Patricius</div>
            <div class="brand-subtitle">Agent Review Console</div>
          </div>
        </div>
        <button id="refresh-button" class="ghost-btn" type="button">Refresh</button>
      </header>

      <main class="workspace">
        <aside class="panel panel-left" aria-label="Deals">
          <div class="panel-title">Deals</div>
          <div id="deal-tree" class="deal-tree"></div>
        </aside>

        <section class="panel panel-middle" aria-label="Delta Tables">
          <div class="panel-title">Delta Page</div>
          <div id="periods-container" class="periods-container"></div>
        </section>

        <section class="panel panel-right" aria-label="Evidence And Logs">
          <div class="panel-right-grid">
            <section class="evidence-panel">
              <div class="panel-title">Evidence</div>
              <div id="evidence-content" class="evidence-content"></div>
            </section>
            <section class="logs-panel">
              <div class="panel-title">Logs</div>
              <div id="logs-content" class="logs-content"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <template id="empty-state-template">
      <div class="empty-state">
        <p class="empty-title">No data yet</p>
        <p class="empty-copy">Ingest a package with the internal API to populate this workspace.</p>
      </div>
    </template>

    <script src="/app/app.js" type="module"></script>
  </body>
</html>

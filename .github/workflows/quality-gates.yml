name: quality-gates

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Validate dataset contracts
        run: |
          python tools/validate_dataset.py --packages-dir dataset/packages/proxy_v1_full --labels-dir dataset/labels/proxy_v1_full

      - name: Validate labeling workflow
        run: |
          python tools/check_labeling_quality.py --packages-dir dataset/packages/proxy_v1_full --labels-dir dataset/labels/proxy_v1_full

      - name: Build extraction baseline predictions
        run: |
          mkdir -p dataset/predictions
          python tools/run_extraction_baseline.py \
            --packages-dir dataset/packages/proxy_v1_full \
            --labels-dir dataset/labels/proxy_v1_full \
            --output-file dataset/predictions/ci_predictions.json

      - name: Evaluate quality gates
        run: |
          mkdir -p dataset/eval/reports dataset/eval/history
          python tools/run_eval.py \
            --ground-truth-dir dataset/labels/proxy_v1_full \
            --predictions-file dataset/predictions/ci_predictions.json \
            --output-report dataset/eval/reports/ci_latest.json \
            --history-dir dataset/eval/history \
            --dataset-version dataset_v1.0 \
            --pipeline-version ci \
            --required-streak 1

      - name: Run phase 2 agent workflow
        run: |
          python tools/run_agent_workflow.py \
            --packages-dir dataset/packages/proxy_v1_full \
            --labels-dir dataset/labels/proxy_v1_full \
            --output-file dataset/predictions/ci_workflow_predictions.json \
            --events-log dataset/eval/ci_agent_events.jsonl \
            --max-retries 2 \
            --truncate-log

      - name: Verify event log integrity
        run: |
          python tools/check_event_log_integrity.py --events-log dataset/eval/ci_agent_events.jsonl

      - name: Validate shadow partition readiness (preflight)
        run: |
          python tools/validate_shadow_partition.py \
            --packages-dir dataset/examples/ci_shadow_gate/packages \
            --labels-dir dataset/examples/ci_shadow_gate/labels \
            --min-packages 1 \
            --min-deals 1 \
            --min-periods-per-deal 1 \
            --skip-storage-check

      - name: Run release-candidate gate preflight
        run: |
          mkdir -p runtime
          python tools/run_release_candidate_gate.py \
            --runtime-profile dev \
            --skip-strict-config \
            --smoke-packages-dir dataset/examples/ci_shadow_gate/packages \
            --smoke-labels-dir dataset/examples/ci_shadow_gate/labels \
            --smoke-max-packages 1 \
            --smoke-extraction-mode eval \
            --shadow-packages-dir dataset/examples/ci_shadow_gate/packages \
            --shadow-labels-dir dataset/examples/ci_shadow_gate/labels \
            --shadow-min-packages 1 \
            --shadow-min-deals 1 \
            --shadow-min-periods-per-deal 1 \
            --shadow-skip-storage-check \
            --shadow-required-streak 1 \
            --shadow-min-eval-packages 1 \
            --shadow-history-dir dataset/eval/history/ci_shadow \
            --shadow-pipeline-version ci_rc_preflight \
            --output-summary runtime/ci_release_candidate_summary.json

      - name: Run tests
        run: |
          pytest -q
